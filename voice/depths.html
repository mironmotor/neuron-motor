<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Depths · Запись и слои</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#00ff88; font-family:'Segoe UI',Arial,sans-serif; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  h1 { font-size:2rem; text-align:center; }
  p.sub { text-align:center; opacity:.8; margin:6px 0 14px; }
  .info { background:#0d1a14; border:1px solid #1d2a24; color:#8a978f; border-radius:12px; padding:10px 16px; font-size:.85rem; text-align:center; margin-bottom:16px; }

  .controls { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
  button.big { font-size:1.15rem; padding:13px 30px; background:#00cc66; color:#000; border:none; border-radius:50px; font-weight:bold; cursor:pointer; transition:.2s; }
  button.big:hover { background:#00ff88; transform:scale(1.03); }
  button.big.active { background:#ffb000; }
  button#recBtn.rec { background:#ff4444; color:#000; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(255,68,68,.5);} 50%{ box-shadow:0 0 0 9px rgba(255,68,68,0);} }
  button.ghost { font-size:.9rem; padding:11px 20px; background:#0d120f; color:#00ff88; border:1px solid #1d2a24; border-radius:50px; font-weight:bold; cursor:pointer; }
  .volrow { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border:1px solid #1d2a24; border-radius:50px; background:#0d120f; font-size:.8rem; color:#6f7d76; }
  .volrow input { width:120px; accent-color:#00ff88; }
  #status { text-align:center; min-height:24px; margin-bottom:16px; font-size:1.05rem; }

  #player { display:none; }
  .layer { display:grid; grid-template-columns: 1fr 120px; gap:14px; align-items:center;
    background:#0d120f; border:1px solid #1d2a24; border-radius:14px; padding:12px 16px; margin-bottom:10px; }
  .layer .info-l .name { font-weight:bold; font-size:1.05rem; }
  .layer .info-l .band { font-size:.72rem; color:#6f7d76; }
  .layer .meter { grid-column:1 / -1; height:9px; background:#0c1210; border:1px solid #1d2a24; border-radius:6px; overflow:hidden; }
  .layer .meter .fill { height:100%; width:0%; background:linear-gradient(90deg,#0c5,#0fa,#5ff); transition:width .06s linear; }
  .toggle { padding:14px 0; border-radius:12px; border:1px solid #3a2; background:#11181a; color:#6f7d76; font-weight:bold; cursor:pointer; font-size:1rem; transition:.15s; }
  .toggle.on { background:#00cc66; color:#000; border-color:#00ff88; box-shadow:0 0 14px rgba(0,255,136,.4); }
  .foot { margin-top:18px; text-align:center; }
  .foot a { color:#6f7d76; font-size:.85rem; text-decoration:none; margin:0 10px; }
  .foot a:hover { color:#00ff88; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 Глубины голоса</h1>
  <p class="sub">Запиши голос — и услышь его, разложенным на 6 слоёв. Каждый слой включается одной кнопкой.</p>
  <div class="info">✅ Звук играет из записи — наушники не обязательны, свиста не будет.</div>

  <div class="controls">
    <button class="big" id="recBtn">⏺ Записать голос</button>
  </div>

  <div id="status">Нажми «Записать», скажи что-нибудь, потом останови запись.</div>

  <div id="player">
    <div class="controls">
      <button class="big" id="playBtn">▶ Играть</button>
      <button class="ghost" id="reRecBtn">⟲ Перезаписать</button>
      <button class="ghost" id="dlBtn">💾 Скачать запись</button>
      <span class="volrow">громкость <input type="range" id="vol" min="0" max="1.5" step="0.01" value="1"></span>
    </div>
    <div id="layers"></div>
  </div>

  <div class="foot">
    <a href="index.html">← Визуальная версия</a>
    <a href="studio.html">🌸 Studio</a>
    <a href="../">↑ Оригинал</a>
  </div>
</div>

<script>
const LAYERS = [
  { name:'1 · Глубокий низ', band:[70,180] },
  { name:'2 · Грудной',      band:[180,360] },
  { name:'3 · Основной',     band:[360,700] },
  { name:'4 · Присутствие',  band:[700,1400] },
  { name:'5 · Яркость',      band:[1400,3000] },
  { name:'6 · Воздух/верх',  band:[3000,7000] },
];
const MAKEUP = 1.8; // компенсация громкости узкой полосы

let ctx = null, stream = null, mediaRec = null, recChunks = [], recordedBlob = null, recordedBuffer = null;
let isRecording = false, isPlaying = false, source = null, masterGain = null, raf = null;
const layerOn = LAYERS.map(() => true);
const layerNodes = []; // { gain, an, buf, meterEl }

const el = id => document.getElementById(id);
const recBtn = el('recBtn'), playBtn = el('playBtn'), reRecBtn = el('reRecBtn'),
      dlBtn = el('dlBtn'), volEl = el('vol'), statusEl = el('status'),
      playerEl = el('player'), layersEl = el('layers');

// ---- строим UI слоёв (одна кнопка-переключатель на слой) ----
LAYERS.forEach((L, i) => {
  const div = document.createElement('div'); div.className = 'layer';
  div.innerHTML = `
    <div class="info-l"><div class="name">${L.name}</div><div class="band">${L.band[0]}–${L.band[1]} Гц</div></div>
    <button class="toggle on" id="lay${i}">ВКЛ</button>
    <div class="meter"><div class="fill" id="meter${i}"></div></div>`;
  layersEl.appendChild(div);
});
LAYERS.forEach((L, i) => el('lay' + i).addEventListener('click', () => toggleLayer(i)));

async function ensureCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (ctx.state === 'suspended') await ctx.resume();
}
async function ensureStream() {
  if (!stream) stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false } });
  return stream;
}

// ---- ЗАПИСЬ ----
recBtn.addEventListener('click', async () => {
  await ensureCtx();
  if (isRecording) { mediaRec.stop(); return; }
  try {
    await ensureStream();
    recChunks = [];
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
    mediaRec.onstop = onRecStop;
    mediaRec.start();
    isRecording = true; recBtn.classList.add('rec'); recBtn.textContent = '⏹ Остановить запись';
    statusEl.textContent = '🔴 Идёт запись… говори в микрофон';
  } catch (err) { statusEl.innerHTML = `<span style="color:#ff6666">Ошибка доступа к микрофону: ${err.message || err}</span>`; }
});
reRecBtn.addEventListener('click', () => { if (isPlaying) stopPlayback(); recBtn.click(); });

async function onRecStop() {
  isRecording = false; recBtn.classList.remove('rec'); recBtn.textContent = '⏺ Записать заново';
  recordedBlob = new Blob(recChunks, { type: mediaRec.mimeType || 'audio/webm' });
  statusEl.textContent = '💾 Запись сохранена, раскладываю на слои…';
  try {
    const ab = await recordedBlob.arrayBuffer();
    recordedBuffer = await ctx.decodeAudioData(ab);
    playerEl.style.display = 'block';
    statusEl.textContent = '✅ Готово! Жми ▶ Играть и включай/выключай слои';
  } catch (e) { statusEl.innerHTML = `<span style="color:#ff6666">Не удалось обработать запись: ${e.message}</span>`; }
}

// ---- ВОСПРОИЗВЕДЕНИЕ через 6 полосовых фильтров ----
playBtn.addEventListener('click', async () => {
  await ensureCtx();
  if (!recordedBuffer) return;
  if (isPlaying) stopPlayback(); else startPlayback();
});

function startPlayback() {
  masterGain = ctx.createGain(); masterGain.gain.value = parseFloat(volEl.value); masterGain.connect(ctx.destination);
  source = ctx.createBufferSource(); source.buffer = recordedBuffer; source.loop = true;
  layerNodes.length = 0;
  LAYERS.forEach((L, i) => {
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
    const center = Math.sqrt(L.band[0] * L.band[1]), bw = L.band[1] - L.band[0];
    bp.frequency.value = center; bp.Q.value = Math.max(0.7, center / bw);
    const gain = ctx.createGain(); gain.gain.value = layerOn[i] ? MAKEUP : 0;
    const an = ctx.createAnalyser(); an.fftSize = 1024;
    source.connect(bp); bp.connect(gain); gain.connect(masterGain); bp.connect(an); // метр — до гейна
    layerNodes[i] = { gain, an, buf: new Float32Array(an.fftSize), meterEl: el('meter' + i) };
  });
  source.start();
  isPlaying = true; playBtn.textContent = '⏸ Пауза'; playBtn.classList.add('active');
  meterLoop();
}
function stopPlayback() {
  if (source) { try { source.stop(); } catch (e) {} source.disconnect(); source = null; }
  isPlaying = false; playBtn.textContent = '▶ Играть'; playBtn.classList.remove('active');
  if (raf) cancelAnimationFrame(raf);
  layerNodes.forEach(n => n.meterEl.style.width = '0%');
}

function toggleLayer(i) {
  layerOn[i] = !layerOn[i];
  const b = el('lay' + i);
  b.classList.toggle('on', layerOn[i]); b.textContent = layerOn[i] ? 'ВКЛ' : 'ВЫКЛ';
  if (isPlaying && layerNodes[i]) layerNodes[i].gain.gain.setTargetAtTime(layerOn[i] ? MAKEUP : 0, ctx.currentTime, 0.02);
}

volEl.addEventListener('input', () => { if (masterGain) masterGain.gain.value = parseFloat(volEl.value); });

dlBtn.addEventListener('click', () => {
  if (!recordedBlob) return;
  const ext = (recordedBlob.type.includes('mp4') || recordedBlob.type.includes('mpeg')) ? 'm4a' : 'webm';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(recordedBlob);
  a.download = 'voice-' + new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-') + '.' + ext;
  a.click();
});

function meterLoop() {
  if (!isPlaying) return;
  raf = requestAnimationFrame(meterLoop);
  layerNodes.forEach(n => {
    n.an.getFloatTimeDomainData(n.buf);
    let r = 0; for (let i = 0; i < n.buf.length; i++) r += n.buf[i] * n.buf[i];
    r = Math.sqrt(r / n.buf.length);
    n.meterEl.style.width = Math.min(100, Math.sqrt(r) * 140) + '%';
  });
}
</script>
</body>
</html>
