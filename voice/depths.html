<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Depths · Слушать обертоны</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; color:#00ff88; font-family:'Segoe UI',Arial,sans-serif; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  h1 { font-size:2rem; text-align:center; }
  p.sub { text-align:center; opacity:.8; margin:6px 0 14px; }

  .warn { background:#241a0a; border:1px solid #5a4012; color:#ffc24b;
    border-radius:12px; padding:12px 16px; font-size:.9rem; margin-bottom:16px; text-align:center; }

  .row { display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-bottom:12px; }
  button#btn { font-size:1.3rem; padding:14px 40px; background:#00cc66; color:#000; border:none;
    border-radius:50px; font-weight:bold; cursor:pointer; transition:.2s; }
  button#btn:hover { background:#00ff88; transform:scale(1.04); }
  button#btn.active { background:#ff4444; }

  .modes { display:inline-flex; gap:6px; padding:5px; border:1px solid #1d2a24; border-radius:50px; background:#0d120f; }
  .mode-btn { padding:9px 20px; border:none; border-radius:40px; background:transparent; color:#6f7d76; font-weight:bold; cursor:pointer; }
  .mode-btn.active { background:#00cc66; color:#000; }

  .master { display:flex; align-items:center; gap:10px; justify-content:center; margin:8px 0 18px; }
  .master .mbtn { padding:8px 16px; border:1px solid #1d2a24; border-radius:40px; background:#0d120f; color:#00ff88; cursor:pointer; font-weight:bold; }
  .master .mbtn.off { color:#6f7d76; }
  .master input[type=range] { width:160px; accent-color:#00ff88; }

  #status { text-align:center; min-height:24px; margin-bottom:14px; }

  .layer { display:grid; grid-template-columns: 1fr auto auto 110px; gap:10px; align-items:center;
    background:#0d120f; border:1px solid #1d2a24; border-radius:14px; padding:12px 14px; margin-bottom:10px; }
  .layer .info .name { font-weight:bold; }
  .layer .info .band { font-size:.72rem; color:#6f7d76; }
  .layer .meter { grid-column:1 / -1; height:8px; background:#11181400; border:1px solid #1d2a24; border-radius:6px; overflow:hidden; }
  .layer .meter .fill { height:100%; width:0%; background:linear-gradient(90deg,#0c5,#0fa,#5ff); transition:width .06s linear; }
  .sbtn,.mbtn2 { width:42px; height:42px; border-radius:10px; border:1px solid #1d2a24; background:#11181a; color:#6f7d76; font-weight:bold; cursor:pointer; font-size:1rem; }
  .sbtn.on { background:#00cc66; color:#000; border-color:#00ff88; }
  .mbtn2.on { background:#ff4444; color:#000; border-color:#ff6666; }
  .layer input[type=range] { width:110px; accent-color:#00ff88; }
  a.back { display:inline-block; margin-top:14px; color:#6f7d76; font-size:.85rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎧 Глубины голоса</h1>
  <p class="sub">Слушай живой голос, разложенный на обертоны и глубины — в реальном времени</p>

  <div class="warn">⚠️ Надень наушники! Без них микрофон поймает звук из динамика и пойдёт свист (обратная связь).</div>

  <div class="row">
    <button id="btn">▶ Запустить микрофон</button>
    <div class="modes">
      <button class="mode-btn active" data-mode="depth">Глубины</button>
      <button class="mode-btn" data-mode="harm">Обертоны (по тону)</button>
    </div>
  </div>

  <div class="master">
    <button class="mbtn" id="monBtn">🔊 Слышу</button>
    <span style="font-size:.8rem;color:#6f7d76">общая громкость</span>
    <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.85">
  </div>

  <div id="status">Нажми кнопку и надень наушники</div>

  <div id="layers"></div>

  <a class="back" href="index.html">← к спектру (index.html)</a>
</div>

<script>
const LAYERS = [
  { name:'1 · Глубокий низ',  band:[70,180],   harm:1 },
  { name:'2 · Грудной',       band:[180,360],  harm:2 },
  { name:'3 · Основной',      band:[360,700],  harm:3 },
  { name:'4 · Присутствие',   band:[700,1400], harm:4 },
  { name:'5 · Яркость',       band:[1400,3000],harm:5 },
  { name:'6 · Воздух/верх',   band:[3000,7000],harm:6 },
];

let ctx, stream, src, master, pitchAn, pitchBuf, SR, raf;
let isRunning = false, mode = 'depth', monitor = true;
const chains = []; // { bp, gain, an, buf, soloed, muted, vol, meterEl }
let f0smooth = 0;

const el = id => document.getElementById(id);
const btn = el('btn'), statusEl = el('status'), layersEl = el('layers');
const monBtn = el('monBtn'), masterVol = el('masterVol');

// строим UI слоёв
LAYERS.forEach((L, idx) => {
  const div = document.createElement('div'); div.className = 'layer';
  div.innerHTML = `
    <div class="info"><div class="name">${L.name}</div><div class="band" id="band${idx}">${L.band[0]}–${L.band[1]} Гц</div></div>
    <button class="sbtn" id="s${idx}" title="слушать только этот">S</button>
    <button class="mbtn2" id="m${idx}" title="заглушить">M</button>
    <input type="range" id="v${idx}" min="0" max="1.5" step="0.01" value="1">
    <div class="meter"><div class="fill" id="meter${idx}"></div></div>`;
  layersEl.appendChild(div);
});

// режимы
document.querySelectorAll('.mode-btn').forEach(b => b.addEventListener('click', () => {
  mode = b.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(x => x.classList.toggle('active', x === b));
  LAYERS.forEach((L, i) => el('band'+i).textContent = mode === 'depth'
    ? `${L.band[0]}–${L.band[1]} Гц` : `${L.harm}× обертон`);
  if (ctx) configureFilters();
}));

monBtn.addEventListener('click', () => {
  monitor = !monitor;
  monBtn.classList.toggle('off', !monitor);
  monBtn.textContent = monitor ? '🔊 Слышу' : '🔇 Тихо';
  if (master) master.gain.value = monitor ? parseFloat(masterVol.value) : 0;
});
masterVol.addEventListener('input', () => { if (master && monitor) master.gain.value = parseFloat(masterVol.value); });

btn.addEventListener('click', async () => {
  if (isRunning) { stop(); return; }
  statusEl.textContent = 'Запрашиваем доступ к микрофону...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false } });
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();
    SR = ctx.sampleRate;
    src = ctx.createMediaStreamSource(stream);

    master = ctx.createGain();
    master.gain.value = monitor ? parseFloat(masterVol.value) : 0;
    master.connect(ctx.destination);

    // детектор тона
    pitchAn = ctx.createAnalyser(); pitchAn.fftSize = 2048;
    pitchBuf = new Float32Array(2048);
    src.connect(pitchAn);

    // цепочки слоёв: src -> bandpass -> gain -> analyser -> master
    chains.length = 0;
    LAYERS.forEach((L, i) => {
      const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
      const gain = ctx.createGain();
      const an = ctx.createAnalyser(); an.fftSize = 1024;
      // звуковой путь: src -> bp -> gain -> master -> наушники
      src.connect(bp); bp.connect(gain); gain.connect(master);
      // метр снимаем ДО гейна, чтобы визуалка показывала реальное содержимое
      // полосы даже когда слой приглушён или не в соло
      bp.connect(an);
      const c = { bp, gain, an, buf:new Float32Array(an.fftSize),
                  soloed:false, muted:false, vol:1, meterEl:el('meter'+i) };
      chains.push(c);
      el('s'+i).addEventListener('click', () => { c.soloed = !c.soloed; el('s'+i).classList.toggle('on', c.soloed); applyGains(); });
      el('m'+i).addEventListener('click', () => { c.muted = !c.muted; el('m'+i).classList.toggle('on', c.muted); applyGains(); });
      el('v'+i).addEventListener('input', e => { c.vol = parseFloat(e.target.value); applyGains(); });
    });

    configureFilters();
    applyGains();

    isRunning = true;
    btn.textContent = '⏹ Остановить'; btn.classList.add('active');
    statusEl.textContent = '✅ Говори в микрофон. Жми S, чтобы слушать слой отдельно';
    loop();
  } catch (err) {
    statusEl.innerHTML = `<span style="color:#ff6666">Ошибка: ${err.message || 'Доступ запрещён'}</span>`;
  }
});

function stop() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (raf) cancelAnimationFrame(raf);
  if (ctx) ctx.close();
  isRunning = false;
  btn.textContent = '▶ Запустить микрофон'; btn.classList.remove('active');
  statusEl.textContent = 'Остановлено';
  chains.forEach(c => c.meterEl.style.width = '0%');
}

function configureFilters() {
  chains.forEach((c, i) => {
    const L = LAYERS[i];
    if (mode === 'depth') {
      const center = Math.sqrt(L.band[0] * L.band[1]);
      const bw = L.band[1] - L.band[0];
      c.bp.frequency.setTargetAtTime(center, ctx.currentTime, 0.02);
      c.bp.Q.setTargetAtTime(Math.max(0.7, center / bw), ctx.currentTime, 0.02);
    } else {
      c.bp.Q.setTargetAtTime(18, ctx.currentTime, 0.02); // узко — изолируем обертон
    }
  });
}

// solo/mute логика
function applyGains() {
  if (ctx && ctx.state === 'suspended') ctx.resume(); // страховка от заснувшего аудио
  const anySolo = chains.some(c => c.soloed);
  chains.forEach(c => {
    const audible = (anySolo ? c.soloed : true) && !c.muted;
    // makeup ×1.8 — одиночная полоса узкая и тихая, компенсируем громкость
    c.gain.gain.setTargetAtTime(audible ? c.vol * 1.8 : 0, ctx.currentTime, 0.02);
  });
}

// детектор основного тона (автокорреляция)
function detectPitch(buf) {
  const N = buf.length; let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / N);
  if (rms < 0.008) return -1;
  const minLag = Math.max(2, Math.floor(SR / 1000));
  const maxLag = Math.min(N - 2, Math.floor(SR / 70));
  let c0 = 0; for (let i = 0; i < N; i++) c0 += buf[i] * buf[i];
  let best = -1, bestC = 0; const corr = new Float32Array(maxLag + 1);
  for (let lag = minLag; lag <= maxLag; lag++) {
    let s = 0; for (let i = 0; i < N - lag; i++) s += buf[i] * buf[i + lag];
    const c = s / c0; corr[lag] = c;
    if (c > bestC) { bestC = c; best = lag; }
  }
  if (best < 0 || bestC < 0.45) return -1;
  let lag = best; const a = corr[best-1], b = corr[best], cc = corr[best+1], d = (a + cc - 2*b);
  if (d !== 0) lag = best - 0.5 * (cc - a) / d;
  return SR / lag;
}

function loop() {
  if (!isRunning) return;
  raf = requestAnimationFrame(loop);

  // в режиме обертонов подстраиваем фильтры под живой тон
  if (mode === 'harm') {
    pitchAn.getFloatTimeDomainData(pitchBuf);
    const f0 = detectPitch(pitchBuf);
    if (f0 > 0) {
      f0smooth = f0smooth ? f0smooth * 0.6 + f0 * 0.4 : f0;
      chains.forEach((c, i) => {
        const target = Math.min(SR / 2 - 100, f0smooth * LAYERS[i].harm);
        c.bp.frequency.setTargetAtTime(target, ctx.currentTime, 0.03);
        el('band'+i).textContent = `${LAYERS[i].harm}× = ${Math.round(target)} Гц`;
      });
    }
  }

  // метры громкости по слоям
  chains.forEach(c => {
    c.an.getFloatTimeDomainData(c.buf);
    let r = 0; for (let i = 0; i < c.buf.length; i++) r += c.buf[i] * c.buf[i];
    r = Math.sqrt(r / c.buf.length);
    // sqrt-шкала + повышенная чувствительность, чтобы тихие верхние полосы было видно
    c.meterEl.style.width = Math.min(100, Math.sqrt(r) * 140) + '%';
  });
}
</script>
</body>
</html>
