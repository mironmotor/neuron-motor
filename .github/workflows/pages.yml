name: Deploy to GitHub Pages

on:
  push:
    branches: [voice-mode]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # NOTE: the job-level `environment: github-pages` block is intentionally
    # omitted. GitHub resolves that environment during "Set up job", and if
    # Pages isn't enabled yet the run is rejected before any step executes —
    # which prevents the `enablement: true` step below from ever turning Pages
    # on. Without the block the steps run, configure-pages enables Pages, and
    # deploy-pages performs the deployment.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (build type = GitHub Actions) if it isn't
          # enabled yet, so no manual Settings change is required.
          enablement: true

      - name: Upload site (repo root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
